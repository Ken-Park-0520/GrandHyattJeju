<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grand Hyatt T-order Hub</title>
    <meta name="theme-color" content="#800020">
    
    <!-- PWA 앱 아이콘 설정 (웹 호스팅 경로에 맞춰 이미지를 업로드하세요) -->
    <link rel="apple-touch-icon" href="/icon-192x192.png">
    <link rel="manifest" href="/manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=JetBrains+Mono:wght@500&display=swap');

        :root { --brand-color: #800020; }

        body {
            background-color: #0f172a;
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        #app-shell {
            width: 100%;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .auto-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 640px) {
            .auto-grid { grid-template-columns: repeat(2, 1fr); gap: 0.75rem; }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #iframe-container { 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: none; 
            background-color: #fff; flex-direction: column;
        }
        
        #content-iframe { flex: 1; width: 100%; height: 100%; border: none; -webkit-overflow-scrolling: touch; }

        .status-open { background-color: #22c55e; color: white; }
        .status-break { background-color: #f59e0b; color: white; }
        .status-closed { background-color: #ef4444; color: white; }
        .status-off { background-color: #64748b; color: white; }

        .day-tab { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; border: 1px solid #ddd; white-space: nowrap; }
        .day-tab.active { background-color: var(--brand-color); color: white; border-color: var(--brand-color); }

        #digital-clock { font-family: 'JetBrains Mono', monospace; }
        
        .loading-overlay {
            position: fixed; inset: 0;
            background: rgba(255,255,255,0.95);
            display: flex; align-items: center; justify-content: center;
            z-index: 200; opacity: 1; transition: opacity 0.4s;
        }
        .loading-overlay.fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<div id="loading-spinner" class="loading-overlay">
    <div class="flex flex-col items-center gap-4 text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-[#800020] mx-auto"></div>
        <p id="loading-text" class="text-sm font-bold text-gray-500">초기화 중...</p>
    </div>
</div>

<div id="app-shell">
    <header class="sticky top-0 bg-white/90 backdrop-blur-md flex items-center justify-between px-4 py-3 border-b border-gray-100 z-30 shadow-sm relative">
        <!-- 왼쪽: 로고 이미지 -->
        <div class="flex items-center w-1/3">
            <img src="https://i.postimg.cc/05bh80xp/GH.png" alt="Grand Hyatt Logo" class="h-8 md:h-12 w-auto object-contain">
        </div>
        
        <!-- 중앙: 시계 -->
        <div id="digital-clock" class="absolute left-1/2 -translate-x-1/2 text-center w-1/3">
            <div id="clock-time" class="text-xl md:text-2xl font-black text-slate-800 tabular-nums leading-none tracking-tight">00:00:00</div>
        </div>
        
        <!-- 오른쪽: 설정 버튼 & 날짜/요일 -->
        <div class="flex flex-col items-end justify-center w-1/3 gap-1">
            <div class="flex items-center justify-end gap-1.5">
                <button id="edit-toggle" class="hidden px-2.5 py-1 bg-slate-800 text-white text-[10px] font-bold rounded-lg shadow-sm" onclick="window.toggleEditMode()">🛠️ 수정</button>
                <button id="admin-lock-btn" class="p-1.5 bg-slate-50 text-slate-400 rounded-lg border border-slate-100" onclick="window.unlockAdmin()" title="설정 변경">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                </button>
            </div>
            <div id="clock-date" class="text-[9px] md:text-[10px] font-medium text-right leading-none whitespace-nowrap">0000.00.00 <span class="text-slate-400">(요일)</span></div>
        </div>
    </header>

    <main id="menu-screen" class="flex-1 overflow-y-auto p-4 md:p-8 hide-scrollbar">
        <div id="store-grid" class="auto-grid max-w-7xl mx-auto"></div>
    </main>

    <div id="iframe-container">
        <!-- 뷰어 상단 바 -->
        <div id="viewer-header" class="h-14 bg-white border-b flex items-center justify-between px-4 shrink-0 shadow-sm transition-colors">
            <button id="back-btn" class="flex items-center gap-1.5 px-3 py-2 bg-slate-800 text-white rounded-xl font-bold text-xs" onclick="window.goBack()">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7" /></svg>
                Back
            </button>
            <span id="viewer-title" class="font-bold text-slate-700 truncate max-w-[150px] text-sm text-center flex-1 mx-2">Menu</span>
            <button id="outlink-btn" class="p-2 bg-slate-800 text-white rounded-xl font-bold text-xs" onclick="window.open(window.currentOpenUrl, '_blank')">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
            </button>
        </div>
        <iframe id="content-iframe" src="" allow="fullscreen"></iframe>
    </div>
</div>

<div id="pwd-modal" class="hidden fixed inset-0 bg-black/80 z-[110] flex items-center justify-center p-6">
    <div class="bg-white p-8 rounded-3xl shadow-2xl text-center w-full max-w-xs border border-slate-200">
        <h3 class="text-xl font-bold mb-6 text-slate-800">Admin</h3>
        <input type="password" id="admin-pwd" class="w-full p-4 border-2 border-slate-100 rounded-2xl text-2xl text-center outline-none focus:border-[#800020] bg-slate-50 mb-6" placeholder="PIN" inputmode="numeric">
        <div class="flex gap-2">
            <button class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-500" onclick="window.closePwdModal()">취소</button>
            <button class="flex-1 py-3 bg-[#800020] text-white rounded-xl font-bold" onclick="window.verifyAdmin()">확인</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ---------------------------------------------------------
    // 시스템 변수 및 인증 로직 수정
    // ---------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyD916tDwoQeKtP4MQMFdKnsC2AGnOkzYBI",
        authDomain: "grand-hyatt-jeju-menu.firebaseapp.com",
        projectId: "grand-hyatt-jeju-menu",
        storageBucket: "grand-hyatt-jeju-menu.firebasestorage.app",
        messagingSenderId: "452598617384",
        appId: "1:452598617384:web:db5e9b1ceaeaa8bc04ec1d",
        measurementId: "G-B2K4WV3N0C"
    };

    const appId = typeof __app_id !== 'undefined' && __app_id ? __app_id : 'grand-hyatt-jeju-menu';
    const weekDays = ['일', '월', '화', '수', '목', '금', '토'];
    const ADMIN_PASSWORD = '0520';

    window.stores = [];
    window.isEditMode = false;
    window.isAdmin = false;
    window.currentOpenUrl = "";
    window.editingDay = new Date().getDay();

    const createWeeklyTemplate = () => {
        let t = {}; 
        weekDays.forEach((_, i) => t[i] = { isOff: false, sessions: [{ label: "1차", open: "09:00", close: "14:00" }, { label: "2차", open: "17:00", close: "21:00" }, { label: "3차", open: "00:00", close: "00:00" }] }); 
        return t;
    };

    const defaultStores = [
        { id: 1, name: "Gallery Lounge", floor: "L1", themeColor: "#463B33", url: "https://edit.istay.io/viewer/index.html?site=fbgal#/ko/store/984d8fc9-d58a-4bcf-aed8-1d803a1b32ed/3790ozmo", img: "https://i.postimg.cc/HkLjfYLF/gaelleolilaunji.jpg", weekly: createWeeklyTemplate() },
        { id: 2, name: "99Valley", floor: "L2", themeColor: "#82611c", url: "https://edit.istay.io/viewer/index.html?site=fb99v#/ko/store/e1635994-e41a-46ca-99bd-08895789001c/7734hio1", img: "https://i.postimg.cc/q7c4BfWJ/99-Valley.jpg", weekly: createWeeklyTemplate() },
        { id: 3, name: "Noknamu", floor: "L3", themeColor: "#453422", url: "https://edit.istay.io/viewer/index.html?site=fbnox#/ko/store/3c677ff1-c1c5-4574-8d60-048496ea1cfa/8481tevr", img: "https://i.postimg.cc/XJXHHdfg/nognamu.jpg", weekly: createWeeklyTemplate() },
        { id: 4, name: "China House", floor: "L3", themeColor: "#7c1818", url: "https://edit.istay.io/viewer/index.html?site=fbchh#/ko/store/c46b6223-3bec-4fdc-99af-c528378cda08/3295bslj", img: "https://i.postimg.cc/263cchQt/chaina-hauseu.jpg", weekly: createWeeklyTemplate() },
        { id: 5, name: "Jeju Hotpot", floor: "L3", themeColor: "#820002", url: "https://edit.istay.io/viewer/index.html?site=fbpot#/ko/store/1158ec0a-7ecf-4a5c-a487-1771f53f3502/483150kk", img: "https://i.postimg.cc/B6tYYHTd/haspas.jpg", weekly: createWeeklyTemplate() },
        { id: 6, name: "Dream Food Court", floor: "L3", themeColor: "#ef942d", url: "https://www.jejudreamtower.com/upload/file/fileresource/2404/17614.pdf", img: "https://i.postimg.cc/ydWQQcmj/deulim-pudeukoteu.jpg", weekly: createWeeklyTemplate() },
        { id: 7, name: "Grand Kitchen", floor: "L4", themeColor: "#5e5047", url: "https://www.jejudreamtower.com/upload/file/fileresource/966/17619.pdf", img: "https://i.postimg.cc/MG93mdQt/geulaendeu-kichin.jpg", weekly: createWeeklyTemplate() },
        { id: 8, name: "Deli", floor: "L4", themeColor: "#90b2af", url: "https://www.jejudreamtower.com/upload/file/fileresource/959/17523.pdf", img: "https://i.postimg.cc/Kz4qqBPD/delli.jpg", weekly: createWeeklyTemplate() },
        { id: 9, name: "Yumeyama", floor: "L4", themeColor: "#031d42", url: "https://edit.istay.io/viewer/index.html?site=fbyum#/ko/store/d3a3203c-c733-49e0-a395-7109edb5c528/7560zc5b", img: "https://i.postimg.cc/76bss03W/yumeyama.jpg", weekly: createWeeklyTemplate() },
        { id: 10, name: "The 88", floor: "L8", themeColor: "#8dad21", url: "https://edit.istay.io/viewer/index.html?site=fbcaf#/ko/store/c11f69b7-2b3f-44d8-a767-938340977a33/1265f4rr", img: "https://i.postimg.cc/LsxQ3N1y/deo-88.jpg", weekly: createWeeklyTemplate() },
        { id: 11, name: "The 88 Terrace", floor: "L8", themeColor: "#8dad21", url: "https://edit.istay.io/viewer/index.html?site=fbcaf#/ko/store/c88f0b25-462a-470d-a86e-52c3a2f1fac0/6704y042", img: "https://i.postimg.cc/k5TYvfbf/deo-88-telaseu.jpg", weekly: createWeeklyTemplate() },
        { id: 12, name: "Lounge 38", floor: "L38", themeColor: "#77582c", url: "https://edit.istay.io/viewer/index.html?site=fbl38#/ko/store/2db5dc63-bd21-4244-8892-fb3eca8f5e8d/4809kmhi", img: "https://i.postimg.cc/TwbM4V0Y/launji-38.jpg", weekly: createWeeklyTemplate() },
        { id: 13, name: "Blue Dragon", floor: "L8", themeColor: "#031d42", url: "https://edit.istay.io/viewer/index.html?site=fbbdg#/ko/store/ef3b1278-b47c-49e6-aa8b-d2ca2746c32c/86042d2h", img: "https://i.postimg.cc/9Mz88Zd8/beulludeulaegon.jpg", weekly: createWeeklyTemplate() },
        { id: 14, name: "Pocha", floor: "L38", themeColor: "#c23c61", url: "https://edit.istay.io/viewer/index.html?site=fbcha#/ko/store/85ac8f34-f6af-4e1a-9561-10c277c8e7e1/5699dovg", img: "https://i.postimg.cc/vBDqqfrj/pocha.jpg", weekly: createWeeklyTemplate() },
    ];

    async function init() {
        startClock();
        
        window.stores = [...defaultStores];
        render();

        if (!firebaseConfig) {
            setTimeout(hideSpinner, 500);
            return;
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        try {
            document.getElementById('loading-text').innerText = "보안 인증 중...";
            let isAuthSuccess = false;
            
            // 캔버스 환경이 발급한 토큰이 외부 프로젝트(고객님 DB)와 충돌하는 것을 방지
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                try {
                    await signInWithCustomToken(auth, __initial_auth_token);
                    isAuthSuccess = true;
                } catch(tokenErr) {
                    console.warn("고객님의 자체 파이어베이스 설정 사용으로 인해 익명 로그인으로 자동 전환합니다.");
                }
            } 
            
            if (!isAuthSuccess) {
                await signInAnonymously(auth);
            }
        } catch (e) {
            console.error("인증 실패. 파이어베이스 콘솔에서 '익명(Anonymous)' 로그인이 켜져 있는지 확인하세요.", e);
            document.getElementById('loading-text').innerHTML = "<span class='text-red-500'>인증 실패 (오프라인 모드)</span><br><span class='text-[10px] text-gray-500 mt-2 block'>Firebase 콘솔 > Authentication 에서<br>'익명 로그인'을 켜주세요.</span>";
            setTimeout(hideSpinner, 5000);
            return;
        }

        onAuthStateChanged(auth, (user) => {
            if (!user) return;
            document.getElementById('loading-text').innerText = "데이터 동기화 중...";

            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'storeConfigs', 'main');
            
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const dbData = docSnap.data().stores;
                    window.stores = dbData.map((s, i) => ({
                        ...s,
                        floor: s.floor || defaultStores[i]?.floor || '',
                        themeColor: s.themeColor || defaultStores[i]?.themeColor || '#ffffff'
                    }));
                } else {
                    setDoc(docRef, { stores: defaultStores });
                }
                render();
                hideSpinner();
            }, (err) => {
                console.error("파이어베이스 동기화 오류 발생", err);
                hideSpinner();
            });
        });

        window.saveToCloud = async () => {
            if (!auth.currentUser) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'storeConfigs', 'main');
            await setDoc(docRef, { stores: window.stores });
        };
    }

    function hideSpinner() {
        const spinner = document.getElementById('loading-spinner');
        if (spinner) spinner.classList.add('fade-out');
    }

    function startClock() {
        const dateEl = document.getElementById('clock-date');
        const timeEl = document.getElementById('clock-time');
        setInterval(() => {
            const now = new Date();
            const dayIdx = now.getDay();
            
            let dayColor = "text-slate-400";
            if (dayIdx === 0) dayColor = "text-red-500";
            else if (dayIdx === 6) dayColor = "text-blue-500";

            dateEl.innerHTML = `<span class="text-slate-400">${now.getFullYear()}. ${String(now.getMonth() + 1).padStart(2, '0')}. ${String(now.getDate()).padStart(2, '0')}.</span> <span class="${dayColor} font-bold">(${weekDays[dayIdx]})</span>`;
            
            timeEl.innerText = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            if (now.getSeconds() === 0) render(); 
        }, 1000);
    }

    function timeToMin(timeStr) {
        if(!timeStr || !timeStr.includes(':')) return 0;
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function getBusinessStatus(store) {
        const now = new Date();
        const curMin = now.getHours() * 60 + now.getMinutes();
        const nowDay = now.getDay();
        const prevDay = (nowDay + 6) % 7; 

        const todaySched = store.weekly[nowDay];
        const prevSched = store.weekly[prevDay];

        if (prevSched && !prevSched.isOff) {
            const prevSessions = (prevSched.sessions || []).filter(s => s.open !== s.close);
            for (let s of prevSessions) {
                let open = timeToMin(s.open);
                let close = timeToMin(s.close);
                if (close <= open && curMin < close) {
                    return { label: "Open", class: "status-open", next: `${s.label} 마감: ${s.close}` };
                }
            }
        }

        if (!todaySched || todaySched.isOff) return { label: "Off", class: "status-off", next: "내일 확인" };
        
        const sessions = (todaySched.sessions || []).filter(s => s.open !== s.close).sort((a, b) => timeToMin(a.open) - timeToMin(b.open));
        if (sessions.length === 0) return { label: "정보 없음", class: "status-closed", next: "영업 시간 설정 필요" };

        for (let i = 0; i < sessions.length; i++) {
            let open = timeToMin(sessions[i].open);
            let close = timeToMin(sessions[i].close);
            let actualClose = close <= open ? close + 1440 : close; 
            
            if (curMin >= open && curMin < actualClose) {
                return { label: "Open", class: "status-open", next: `${sessions[i].label} 마감: ${sessions[i].close}` };
            }
        }

        let firstOpen = timeToMin(sessions[0].open);
        if (curMin < firstOpen) {
            return { label: "Ready", class: "status-break", next: `오픈: ${sessions[0].open}` };
        }

        for (let i = 0; i < sessions.length - 1; i++) {
            let currentClose = timeToMin(sessions[i].close);
            let nextOpen = timeToMin(sessions[i+1].open);
            
            if (currentClose <= timeToMin(sessions[i].open)) currentClose += 1440; 
            
            if (curMin >= currentClose && curMin < nextOpen) {
                return { label: "Break", class: "status-break", next: `재오픈: ${sessions[i+1].open}` };
            }
        }

        return { label: "Closed", class: "status-closed", next: "영업 종료" };
    }

    function render() {
        const grid = document.getElementById('store-grid');
        if (!grid) return;
        grid.innerHTML = '';
        const nowDay = new Date().getDay();

        window.stores.forEach((store, sIdx) => {
            const status = getBusinessStatus(store);
            const cardDay = window.isEditMode ? window.editingDay : nowDay;
            const sched = store.weekly[cardDay];
            const isPdf = store.url.toLowerCase().endsWith('.pdf') || store.url.includes('drive.google.com');
            const safeThemeColor = store.themeColor || '#ffffff';

            const card = document.createElement('div');
            card.className = `store-card bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden flex flex-col ${window.isEditMode ? 'ring-2 ring-[#800020]' : ''}`;
            card.innerHTML = `
                <div class="aspect-video relative cursor-pointer overflow-hidden" onclick="!window.isEditMode && window.openLink('${store.url}', '${store.name}', '${safeThemeColor}')">
                    <img src="${store.img}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/5"></div>
                    <div class="absolute top-2 left-2 flex gap-1">
                        <div class="px-2 py-0.5 rounded-full text-[9px] font-bold shadow-sm ${status.class}">${status.label}</div>
                    </div>
                    ${isPdf ? `<div class="absolute top-2 right-2 px-1.5 py-0.5 bg-red-600 text-white rounded font-bold text-[8px] shadow-sm">PDF</div>` : ''}
                </div>
                <div class="p-4 flex flex-col gap-1">
                    <h3 class="text-sm md:text-base font-bold text-slate-800 truncate leading-tight flex items-center gap-1.5">
                        <span class="w-1/2 p-1.5 border rounded-lg text-[10px] font-bold shrink-0 shadow-sm">${store.floor || '-'}</span>
                        ${store.name}
                    </h3>
                    <div style="display:${window.isEditMode ? 'none' : 'block'}">
                        <div class="flex flex-wrap gap-1 mb-1">
                            ${sched.isOff ? '<span class="text-red-500 font-bold text-[10px]">정기 휴무</span>' : 
                                (sched.sessions || []).filter(s => s.open !== s.close).map(s => 
                                    `<span class="px-1.5 py-0.5 bg-gray-50 rounded text-[9px] text-gray-400 font-bold">${s.label}: ${s.open}-${s.close}</span>`
                                ).join('')
                            }
                        </div>
                        <p class="text-[11px] font-bold text-slate-500 truncate">${status.next}</p>
                    </div>
                    <div style="display:${window.isEditMode ? 'block' : 'none'}" class="space-y-3 mt-1">
                        <div class="flex gap-2" onclick="event.stopPropagation()">
                            <input type="text" class="w-1/2 p-1.5 border rounded-lg text-[10px]" value="${store.floor || ''}" onchange="window.updateStoreField(${sIdx}, 'floor', this.value)" placeholder="층수 (예: L3)">
                            <div class="w-1/2 flex items-center gap-1 border rounded-lg px-2 bg-white">
                                <span class="text-[9px] text-gray-500 whitespace-nowrap">상단색상</span>
                                <input type="color" class="w-full h-6 p-0 border-0 bg-transparent cursor-pointer" value="${safeThemeColor}" onchange="window.updateStoreField(${sIdx}, 'themeColor', this.value)">
                            </div>
                        </div>

                        <div class="flex overflow-x-auto gap-1 pb-1 hide-scrollbar">
                            ${weekDays.map((d, i) => `<div class="day-tab ${window.editingDay == i ? 'active' : ''}" onclick="window.changeDay(${i});event.stopPropagation();">${d}</div>`).join('')}
                        </div>
                        
                        <div class="space-y-2 p-2 bg-slate-50 rounded-xl border border-slate-200">
                            <label class="flex items-center gap-1 cursor-pointer" onclick="event.stopPropagation()">
                                <input type="checkbox" onchange="window.updateWeekly(${sIdx}, ${window.editingDay}, 'isOff', this.checked)" ${sched.isOff ? 'checked' : ''}>
                                <span class="text-[10px] font-bold text-red-500">이 요일 휴무</span>
                            </label>
                            <div class="${sched.isOff ? 'opacity-30 pointer-events-none' : ''}">
                                ${(sched.sessions || []).map((sess, sessIdx) => `
                                    <div class="grid grid-cols-3 gap-1 pb-1.5 border-b border-slate-100 last:border-0" onclick="event.stopPropagation()">
                                        <input type="text" class="p-1 border rounded text-[9px]" value="${sess.label}" onchange="window.updateSession(${sIdx}, ${window.editingDay}, ${sessIdx}, 'label', this.value)">
                                        <input type="text" class="p-1 border rounded text-[9px]" value="${sess.open}" onchange="window.updateSession(${sIdx}, ${window.editingDay}, ${sessIdx}, 'open', this.value)">
                                        <input type="text" class="p-1 border rounded text-[9px]" value="${sess.close}" onchange="window.updateSession(${sIdx}, ${window.editingDay}, ${sessIdx}, 'close', this.value)">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <input type="text" class="w-full p-1.5 border rounded-lg text-[9px]" value="${store.url}" onchange="window.updateStoreField(${sIdx}, 'url', this.value)" placeholder="링크" onclick="event.stopPropagation()">
                        <input type="text" class="w-full p-1.5 border rounded-lg text-[9px]" value="${store.img}" onchange="window.updateStoreField(${sIdx}, 'img', this.value)" placeholder="이미지" onclick="event.stopPropagation()">
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    window.changeDay = (day) => { window.editingDay = day; render(); };
    window.updateWeekly = (sIdx, day, field, value) => { window.stores[sIdx].weekly[day][field] = value; if(window.saveToCloud) window.saveToCloud(); };
    window.updateSession = (sIdx, day, sessIdx, field, value) => { window.stores[sIdx].weekly[day].sessions[sessIdx][field] = value; if(window.saveToCloud) window.saveToCloud(); };
    window.updateStoreField = (sIdx, field, value) => { window.stores[sIdx][field] = value; if(window.saveToCloud) window.saveToCloud(); };

    window.unlockAdmin = () => {
        if (window.isAdmin) { window.isAdmin=false; window.isEditMode=false; document.getElementById('edit-toggle').classList.add('hidden'); render(); }
        else { document.getElementById('pwd-modal').classList.remove('hidden'); document.getElementById('admin-pwd').focus(); }
    };

    window.verifyAdmin = () => {
        if (document.getElementById('admin-pwd').value === ADMIN_PASSWORD) { window.isAdmin=true; document.getElementById('edit-toggle').classList.remove('hidden'); window.closePwdModal(); render(); }
        else alert("틀렸습니다.");
    };

    window.closePwdModal = () => { document.getElementById('pwd-modal').classList.add('hidden'); document.getElementById('admin-pwd').value = ''; };
    window.toggleEditMode = () => { window.isEditMode=!window.isEditMode; render(); };

    window.openLink = (url, title, themeColor) => {
        let targetUrl = url;
        
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile && targetUrl.includes('/store/')) {
            targetUrl = targetUrl.replace('/store/', '/shop/');
        }

        window.currentOpenUrl = targetUrl;
        
        if (targetUrl.includes('drive.google.com')) {
            const fileId = targetUrl.split('/d/')[1]?.split('/')[0] || targetUrl.split('id=')[1]?.split('&')[0];
            if (fileId) targetUrl = `https://docs.google.com/viewer?url=https://drive.google.com/uc?id=${fileId}&embedded=true`;
        }
        
        const isPdf = targetUrl.toLowerCase().endsWith('.pdf') || targetUrl.includes('drive.google.com');
        if (isMobile && isPdf) { window.location.href = targetUrl; return; }
        
        const header = document.getElementById('viewer-header');
        const titleEl = document.getElementById('viewer-title');
        const backBtn = document.getElementById('back-btn');
        const outlinkBtn = document.getElementById('outlink-btn');
        
        if (!isPdf && themeColor && themeColor !== '#ffffff') {
            header.style.backgroundColor = themeColor;
            header.style.borderBottomColor = themeColor;
            titleEl.style.color = '#ffffff'; 
            
            backBtn.className = "flex items-center gap-1.5 px-3 py-2 bg-white/20 text-white rounded-xl font-bold text-xs backdrop-blur-sm";
            outlinkBtn.className = "p-2 bg-white/20 text-white rounded-xl font-bold text-xs backdrop-blur-sm";
        } else {
            header.style.backgroundColor = '#ffffff';
            header.style.borderBottomColor = '#e2e8f0'; 
            titleEl.style.color = '#334155'; 
            
            backBtn.className = "flex items-center gap-1.5 px-3 py-2 bg-slate-800 text-white rounded-xl font-bold text-xs";
            outlinkBtn.className = "p-2 bg-slate-800 text-white rounded-xl font-bold text-xs";
        }

        document.getElementById('iframe-container').style.display = 'flex';
        document.getElementById('content-iframe').src = targetUrl;
        titleEl.innerText = title;
        document.body.style.overflow = 'hidden';
    };

    window.goBack = () => { 
        document.getElementById('content-iframe').src = ''; 
        document.getElementById('iframe-container').style.display = 'none'; 
        document.body.style.overflow = 'auto'; 
    };

    init();
</script>

</body>
</html>
